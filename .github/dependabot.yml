version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - supply-chain
    groups:
      reviewed-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - supply-chain
    groups:
      maintainer-quality:
        patterns:
          - ruff
          - mypy
          - bandit
          - coverage
