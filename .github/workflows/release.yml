name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact existing tag selected for this release (vMAJOR.MINOR.PATCH)
        required: true
        type: string
      publish:
        description: Publish the verified artifacts as a GitHub release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out the selected tag without persisted credentials
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
      - name: Verify exact clean tagged release intent
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: python3 -m agent_starter.release_safety --root . --expected-tag "$RELEASE_TAG" --actual-ref "$GITHUB_REF"
      - name: Run complete trusted checks
        run: ./scripts/check.sh
      - name: Build exact release artifacts without installing packages
        run: python3 -m agent_starter.build_frontend --root . --outdir "$RUNNER_TEMP/release"
      - name: Create create-only checksum and SPDX evidence
        run: python3 -m agent_starter.release_artifacts "$RUNNER_TEMP/release"
      - name: Smoke-install the exact release artifacts
        run: ./scripts/release-artifact-smoke.sh "$RUNNER_TEMP/release"
      - name: Upload fixed-name verified release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: omen-agentkit-verified-release-candidate
          path: ${{ runner.temp }}/release/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
      - name: Attest exact checksum-listed release subjects
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: ${{ runner.temp }}/release/SHA256SUMS

  publish_release:
    if: needs.verify_release.result == 'success' && inputs.publish == true
    needs: verify_release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download the verified fixed-name candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: omen-agentkit-verified-release-candidate
          path: ${{ runner.temp }}/release
      - name: Reverify downloaded artifact checksums
        run: cd "$RUNNER_TEMP/release" && sha256sum --check SHA256SUMS
      - name: Publish the exact existing tag and verified assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf '%s\n' 'Release tag is not vMAJOR.MINOR.PATCH.' >&2
            exit 2
          fi
          test "$GITHUB_REF" = "refs/tags/$RELEASE_TAG"
          test "$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)" = "$GITHUB_SHA"
          gh release create "$RELEASE_TAG" \
            "$RUNNER_TEMP/release/"*.whl \
            "$RUNNER_TEMP/release/"*.tar.gz \
            "$RUNNER_TEMP/release/SHA256SUMS" \
            "$RUNNER_TEMP/release/release.spdx.json" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-from-tag \
            --draft
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false
